spring.application.name=pdciae-back
# Deshabilitamos Docker Compose para evitar conflictos en el entorno de Render
spring.docker.compose.enabled=false

# Render puede usar distintos nombres de variable para cadenas de conexión.
# Orden de prioridad: SPRING_DATA_MONGODB_URI > MONGODB_URI > MONGO_URI > MONGODB_URL > DATABASE_URL.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:${MONGO_URI:${MONGODB_URL:${DATABASE_URL:}}}}}

# Render asigna dinámicamente un puerto a través de la variable PORT
server.port=${PORT:8080}